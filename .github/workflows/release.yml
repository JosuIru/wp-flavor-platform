# Release Pipeline for Flavor Platform
# Triggers on version tags (v*)
# Creates a GitHub Release with plugin ZIP

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  PHP_VERSION: '8.1'
  NODE_VERSION: '20'

jobs:
  # ===========================================================================
  # Validate Release
  # ===========================================================================
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if prerelease (contains alpha, beta, rc)
          if [[ "$VERSION" =~ (alpha|beta|rc) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate version in plugin file
        run: |
          PLUGIN_VERSION=$(grep -oP "Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+" flavor-platform.php || echo "")
          TAG_VERSION="${{ steps.version.outputs.version }}"

          # Remove prerelease suffix for comparison
          TAG_VERSION_CLEAN=$(echo "$TAG_VERSION" | sed 's/-.*$//')

          if [[ "$PLUGIN_VERSION" != "$TAG_VERSION_CLEAN" ]]; then
            echo "Warning: Plugin version ($PLUGIN_VERSION) does not match tag version ($TAG_VERSION_CLEAN)"
          fi

  # ===========================================================================
  # Build Release
  # ===========================================================================
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Composer dependencies (production)
        run: composer install --prefer-dist --no-dev --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: |
          npm run build:prod
          npm run build:vbp

      - name: Create release directory
        run: |
          mkdir -p release/flavor-platform

          # Copy plugin files
          cp -r includes release/flavor-platform/
          cp -r admin release/flavor-platform/
          cp -r addons release/flavor-platform/
          cp -r assets release/flavor-platform/
          cp -r templates release/flavor-platform/
          cp -r languages release/flavor-platform/
          cp -r vendor release/flavor-platform/

          # Copy main files
          cp flavor-platform.php release/flavor-platform/
          cp uninstall.php release/flavor-platform/
          cp README.md release/flavor-platform/
          cp CHANGELOG.md release/flavor-platform/

          # Remove development files from assets
          find release/flavor-platform/assets -name "*.map" -delete
          find release/flavor-platform/assets -name "*.ts" -delete
          find release/flavor-platform/assets -type d -name "src" -exec rm -rf {} + 2>/dev/null || true

          # Remove unnecessary directories
          rm -rf release/flavor-platform/vendor/bin
          rm -rf release/flavor-platform/vendor/*/tests
          rm -rf release/flavor-platform/vendor/*/.git

      - name: Create ZIP
        run: |
          cd release
          zip -r ../flavor-platform-${{ needs.validate.outputs.version }}.zip flavor-platform
          cd ..
          ls -lh flavor-platform-${{ needs.validate.outputs.version }}.zip

      - name: Calculate checksum
        run: |
          sha256sum flavor-platform-${{ needs.validate.outputs.version }}.zip > flavor-platform-${{ needs.validate.outputs.version }}.zip.sha256

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-zip
          path: |
            flavor-platform-${{ needs.validate.outputs.version }}.zip
            flavor-platform-${{ needs.validate.outputs.version }}.zip.sha256
          retention-days: 30

  # ===========================================================================
  # Create GitHub Release
  # ===========================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate, build]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-zip

      - name: Generate release notes
        id: release_notes
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [[ -n "$LAST_TAG" ]]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" $LAST_TAG..HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" -20)
          fi

          # Create release notes
          cat > release_notes.md << 'EOF'
          ## What's Changed

          $COMMITS

          ## Installation

          1. Download `flavor-platform-${{ needs.validate.outputs.version }}.zip`
          2. Go to WordPress Admin > Plugins > Add New > Upload Plugin
          3. Select the ZIP file and click "Install Now"
          4. Activate the plugin

          ## Checksum

          ```
          $(cat flavor-platform-${{ needs.validate.outputs.version }}.zip.sha256)
          ```

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/$LAST_TAG...v${{ needs.validate.outputs.version }}
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Flavor Platform v${{ needs.validate.outputs.version }}
          body_path: release_notes.md
          files: |
            flavor-platform-${{ needs.validate.outputs.version }}.zip
            flavor-platform-${{ needs.validate.outputs.version }}.zip.sha256
          prerelease: ${{ needs.validate.outputs.is_prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ===========================================================================
  # Notify (Optional)
  # ===========================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [validate, release]
    if: success()

    steps:
      - name: Release summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ needs.validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Prerelease**: ${{ needs.validate.outputs.is_prerelease }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Release created successfully!" >> $GITHUB_STEP_SUMMARY
