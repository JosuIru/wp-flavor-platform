# Security Scan Pipeline for Flavor Platform
# Runs weekly and on push to master
# Uses Snyk for dependency vulnerability scanning

name: Security

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  push:
    branches: [master]
  pull_request:
    branches: [master]
    paths:
      - 'composer.json'
      - 'composer.lock'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  # ===========================================================================
  # PHP Dependency Scan
  # ===========================================================================
  php-security:
    name: PHP Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run Snyk PHP scan
        uses: snyk/actions/php@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Run Composer audit
        run: composer audit --format=json > composer-audit.json || true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: php-security-report
          path: composer-audit.json
          retention-days: 30

  # ===========================================================================
  # JavaScript Dependency Scan
  # ===========================================================================
  js-security:
    name: JS Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk JS scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Run npm audit
        run: npm audit --json > npm-audit.json || true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: js-security-report
          path: npm-audit.json
          retention-days: 30

  # ===========================================================================
  # Code Security Analysis
  # ===========================================================================
  code-security:
    name: Code Security Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: phpcs
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run WordPress security checks
        run: |
          # Check for security-related PHPCS rules
          vendor/bin/phpcs --standard=WordPress \
            --sniffs=WordPress.Security.EscapeOutput,WordPress.Security.NonceVerification,WordPress.Security.ValidatedSanitizedInput,WordPress.DB.PreparedSQL \
            --report=json \
            includes/ admin/ > phpcs-security.json 2>&1 || true

      - name: Check for sensitive data patterns
        run: |
          # Look for potential sensitive data exposure
          echo "Checking for sensitive patterns..."

          # Check for hardcoded secrets (basic patterns)
          if grep -rn "password\s*=" --include="*.php" includes/ admin/ 2>/dev/null | grep -v "password_hash\|password_verify\|PASSWORD_DEFAULT" | head -20; then
            echo "Warning: Potential hardcoded passwords found"
          fi

          # Check for API keys
          if grep -rn "api_key\s*=\s*['\"]" --include="*.php" includes/ admin/ 2>/dev/null | head -20; then
            echo "Warning: Potential hardcoded API keys found"
          fi

          echo "Security pattern check complete"

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: code-security-report
          path: phpcs-security.json
          retention-days: 30

  # ===========================================================================
  # Security Summary
  # ===========================================================================
  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [php-security, js-security, code-security]
    if: always()

    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: Generate summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PHP Dependencies | ${{ needs.php-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JS Dependencies | ${{ needs.js-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Analysis | ${{ needs.code-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See artifacts for detailed reports." >> $GITHUB_STEP_SUMMARY
