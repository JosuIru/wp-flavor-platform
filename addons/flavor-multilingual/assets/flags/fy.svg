<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Frisia: Franjas azules diagonales con pompones rojos -->
  <rect width="300" height="200" fill="#fff"/>
  <path d="M0,0 L75,50 L0,100 L75,150 L0,200 L300,200 L225,150 L300,100 L225,50 L300,0 Z" fill="#0052A5"/>
  <!-- Pompones rojos simplificados -->
  <g fill="#C8102E">
    <circle cx="40" cy="50" r="10"/>
    <circle cx="40" cy="150" r="10"/>
    <circle cx="260" cy="50" r="10"/>
    <circle cx="260" cy="150" r="10"/>
    <circle cx="150" cy="100" r="10"/>
  </g>
</svg>
