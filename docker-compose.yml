# =============================================================================
# Docker Compose for Flavor Platform E2E Tests
# =============================================================================
#
# This configuration provides a complete WordPress environment for E2E testing.
#
# Usage:
#   docker-compose up -d          # Start services
#   docker-compose down           # Stop services
#   docker-compose down -v        # Stop and remove volumes
#   docker-compose logs -f        # View logs
#
# Access:
#   WordPress: http://localhost:8080
#   phpMyAdmin: http://localhost:8081
#
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # WordPress
  # ===========================================================================
  wordpress:
    image: wordpress:6.4-php8.1-apache
    container_name: flavor-wp-test
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: "true"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);
        define('WP_ENVIRONMENT_TYPE', 'local');
        define('FLAVOR_TESTING', true);
    volumes:
      # Mount plugin
      - .:/var/www/html/wp-content/plugins/flavor-platform:cached
      # Persist WordPress files
      - wordpress_data:/var/www/html
      # Custom uploads directory
      - uploads_data:/var/www/html/wp-content/uploads
    networks:
      - flavor-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/wp-admin/install.php"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # MySQL Database
  # ===========================================================================
  mysql:
    image: mysql:8.0
    container_name: flavor-mysql-test
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - mysql_data:/var/lib/mysql
      # Custom MySQL config for testing
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - flavor-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ===========================================================================
  # phpMyAdmin (Optional - for debugging)
  # ===========================================================================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: flavor-phpmyadmin-test
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 64M
    networks:
      - flavor-network
    profiles:
      - debug

  # ===========================================================================
  # WP-CLI (for setup and management)
  # ===========================================================================
  wpcli:
    image: wordpress:cli-php8.1
    container_name: flavor-wpcli-test
    depends_on:
      wordpress:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wordpress_data:/var/www/html
      - .:/var/www/html/wp-content/plugins/flavor-platform:cached
      - ./docker/scripts:/scripts:ro
    networks:
      - flavor-network
    user: "33:33"
    entrypoint: ["wp", "--allow-root"]
    profiles:
      - cli

  # ===========================================================================
  # Selenium (for Playwright/E2E tests)
  # ===========================================================================
  selenium:
    image: selenium/standalone-chrome:latest
    container_name: flavor-selenium-test
    restart: unless-stopped
    ports:
      - "4444:4444"
      - "7900:7900"  # VNC viewer
    shm_size: 2gb
    networks:
      - flavor-network
    profiles:
      - e2e

# =============================================================================
# Networks
# =============================================================================
networks:
  flavor-network:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  wordpress_data:
    driver: local
  mysql_data:
    driver: local
  uploads_data:
    driver: local
