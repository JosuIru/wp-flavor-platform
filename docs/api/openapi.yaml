        sector:
          type: string
        descripcion_corta:
          type: string
        logo_url:
          type: string
          format: uri
        ciudad:
          type: string
        pais:
          type: string
        verificado:
          type: boolean
        nivel_consciencia:
          type: string

    DirectoryResponse:
