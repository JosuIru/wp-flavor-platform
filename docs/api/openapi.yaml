openapi: 3.0.3
info:
  title: Flavor Platform REST API
  description: |
    API REST completa para la plataforma Flavor Platform.

    ## Descripcion General

    Flavor Platform proporciona una API REST integral para gestionar comunidades,
    grupos de consumo, redes sociales cooperativas, eventos y mas.

    ## Autenticacion

    La API soporta dos metodos de autenticacion:

    ### Bearer Token (JWT)
    Para aplicaciones moviles y clientes externos:
    ```
    Authorization: Bearer <token>
    ```

    ### WordPress Nonce
    Para peticiones desde el frontend de WordPress:
    ```
    X-WP-Nonce: <nonce>
    ```

    ## Rate Limiting

    - 100 peticiones por minuto para usuarios autenticados
    - 20 peticiones por minuto para usuarios anonimos

    ## Codigos de Respuesta

    | Codigo | Descripcion |
    |--------|-------------|
    | 200 | Exito |
    | 201 | Recurso creado |
    | 400 | Peticion invalida |
    | 401 | No autenticado |
    | 403 | Sin permisos |
    | 404 | No encontrado |
    | 429 | Demasiadas peticiones |
    | 500 | Error del servidor |

  version: 1.0.0
  contact:
    name: Flavor Platform Support
    email: soporte@flavorplatform.com
  license:
    name: GPL v2 or later
    url: https://www.gnu.org/licenses/gpl-2.0.html

servers:
  - url: '{protocol}://{domain}/wp-json'
    description: Servidor WordPress
    variables:
      protocol:
        default: https
        enum:
          - https
          - http
      domain:
        default: tu-dominio.com
        description: Dominio del sitio WordPress

tags:
  - name: Grupos de Consumo
    description: Gestion de pedidos colectivos, productos y suscripciones
  - name: Red de Comunidades
    description: Directorio, mapa y conexiones entre nodos
  - name: PWA
    description: Progressive Web App y sincronizacion
  - name: Temas
    description: Gestion de temas visuales
  - name: Socios
    description: Gestion de membresias y socios
  - name: Eventos
    description: Calendario y gestion de eventos
  - name: Marketplace
    description: Tienda y productos
  - name: Banco de Tiempo
    description: Intercambio de servicios por tiempo
  - name: WooCommerce
    description: Integracion con WooCommerce

paths:
  # ==========================================
  # GRUPOS DE CONSUMO - Pedidos
  # ==========================================
  /flavor-chat-ia/v1/pedidos:
    get:
      tags:
        - Grupos de Consumo
      summary: Listar pedidos colectivos
      description: Obtiene la lista de pedidos colectivos con filtros opcionales
      operationId: getPedidos
      parameters:
        - name: estado
          in: query
          description: Estado del pedido
          schema:
            type: string
            enum: [abierto, cerrado, entregado, todos]
            default: abierto
        - name: per_page
          in: query
          description: Elementos por pagina
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: page
          in: query
          description: Numero de pagina
          schema:
            type: integer
            default: 1
            minimum: 1
      responses:
        '200':
          description: Lista de pedidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PedidosListResponse'
              example:
                success: true
                data:
                  - id: 123
                    titulo: "Aceite de oliva ecologico"
                    productor: "Finca Los Olivos"
                    precio_base: 8.50
                    progreso: 75.5
                    estado: "abierto"
                pagination:
                  total: 25
                  per_page: 10
                  current_page: 1
                  total_pages: 3

  /flavor-chat-ia/v1/pedidos/{id}:
    get:
      tags:
        - Grupos de Consumo
      summary: Obtener detalle de pedido
      operationId: getPedido
      parameters:
        - $ref: '#/components/parameters/PedidoId'
      responses:
        '200':
          description: Detalle del pedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PedidoDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /flavor-chat-ia/v1/pedidos/{id}/unirse:
    post:
      tags:
        - Grupos de Consumo
      summary: Unirse a un pedido
      operationId: unirsePedido
      security:
        - bearerAuth: []
        - wpNonce: []
      parameters:
        - $ref: '#/components/parameters/PedidoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cantidad
              properties:
                cantidad:
                  type: number
                  minimum: 0.1
                  description: Cantidad a solicitar
                  example: 2.5
      responses:
        '200':
          description: Inscripcion exitosa
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Te has unido al pedido!"
                  data:
                    type: object
                    properties:
                      importe_total:
                        type: number
                        example: 21.25
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /flavor-chat-ia/v1/pedidos/{id}/marcar-pagado:
    post:
      tags:
        - Grupos de Consumo
      summary: Marcar pedido como pagado
      operationId: marcarPagado
      security:
        - bearerAuth: []
        - wpNonce: []
      parameters:
        - $ref: '#/components/parameters/PedidoId'
      responses:
        '200':
          description: Marcado como pagado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /flavor-chat-ia/v1/pedidos/{id}/marcar-recogido:
    post:
      tags:
        - Grupos de Consumo
      summary: Marcar pedido como recogido
      operationId: marcarRecogido
      security:
        - bearerAuth: []
        - wpNonce: []
      parameters:
        - $ref: '#/components/parameters/PedidoId'
      responses:
        '200':
          description: Marcado como recogido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /flavor-chat-ia/v1/mis-pedidos:
    get:
      tags:
        - Grupos de Consumo
      summary: Mis pedidos
      description: Obtiene los pedidos en los que participa el usuario autenticado
      operationId: getMisPedidos
      security:
        - bearerAuth: []
        - wpNonce: []
      responses:
        '200':
          description: Lista de mis pedidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MisPedidosResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================
  # GRUPOS DE CONSUMO - Perfil y Preferencias
  # ==========================================
  /flavor-chat-ia/v1/gc/perfil:
    get:
      tags:
        - Grupos de Consumo
      summary: Perfil del consumidor
      operationId: getPerfilConsumidor
      security:
        - bearerAuth: []
        - wpNonce: []
      responses:
        '200':
          description: Perfil del consumidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerfilConsumidorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /flavor-chat-ia/v1/gc/preferencias:
    put:
      tags:
        - Grupos de Consumo
      summary: Actualizar preferencias
      operationId: actualizarPreferencias
      security:
        - bearerAuth: []
        - wpNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                preferencias_alimentarias:
                  type: string
                  description: Preferencias alimentarias del usuario
                  example: "Vegetariano, sin gluten"
                alergias:
                  type: string
                  description: Alergias conocidas
                  example: "Frutos secos, marisco"
      responses:
        '200':
          description: Preferencias actualizadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================
  # GRUPOS DE CONSUMO - Lista de Compra
  # ==========================================
  /flavor-chat-ia/v1/gc/lista-compra:
    get:
      tags:
        - Grupos de Consumo
      summary: Obtener lista de compra
      operationId: getListaCompra
      security:
        - bearerAuth: []
        - wpNonce: []
      responses:
        '200':
          description: Lista de compra del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaCompraResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /flavor-chat-ia/v1/gc/lista-compra/agregar:
    post:
      tags:
        - Grupos de Consumo
      summary: Agregar producto a lista
      operationId: agregarListaCompra
      security:
        - bearerAuth: []
        - wpNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - producto_id
              properties:
                producto_id:
                  type: integer
                  description: ID del producto
                  example: 456
                cantidad:
                  type: number
                  default: 1
                  description: Cantidad a agregar
                  example: 2
      responses:
        '200':
          description: Producto agregado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /flavor-chat-ia/v1/gc/lista-compra/{id}:
    delete:
      tags:
        - Grupos de Consumo
      summary: Quitar producto de lista
      operationId: quitarListaCompra
      security:
        - bearerAuth: []
        - wpNonce: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID del item en la lista
      responses:
        '200':
          description: Producto eliminado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================
  # GRUPOS DE CONSUMO - Suscripciones
  # ==========================================
  /flavor-chat-ia/v1/gc/suscripciones:
    get:
      tags:
        - Grupos de Consumo
      summary: Mis suscripciones
      operationId: getMisSuscripciones
      security:
        - bearerAuth: []
        - wpNonce: []
      responses:
        '200':
          description: Lista de suscripciones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuscripcionesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Grupos de Consumo
      summary: Crear suscripcion
      operationId: crearSuscripcion
      security:
        - bearerAuth: []
        - wpNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tipo_cesta_id
              properties:
                tipo_cesta_id:
                  type: integer
                  description: ID del tipo de cesta
                  example: 1
                frecuencia:
                  type: string
                  enum: [semanal, quincenal, mensual]
                  default: semanal
                  description: Frecuencia de entrega
      responses:
        '200':
          description: Suscripcion creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /flavor-chat-ia/v1/gc/suscripciones/{id}/pausar:
    post:
      tags:
        - Grupos de Consumo
      summary: Pausar suscripcion
      operationId: pausarSuscripcion
      security:
        - bearerAuth: []
        - wpNonce: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Suscripcion pausada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /flavor-chat-ia/v1/gc/suscripciones/{id}/cancelar:
    post:
      tags:
        - Grupos de Consumo
      summary: Cancelar suscripcion
      operationId: cancelarSuscripcion
      security:
        - bearerAuth: []
        - wpNonce: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                motivo:
                  type: string
                  description: Motivo de cancelacion
      responses:
        '200':
          description: Suscripcion cancelada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================
  # GRUPOS DE CONSUMO - Productos y Catalogo
  # ==========================================
  /flavor-chat-ia/v1/gc/productos:
    get:
      tags:
        - Grupos de Consumo
      summary: Catalogo de productos
      operationId: getCatalogoProductos
      parameters:
        - name: categoria
          in: query
          schema:
            type: string
          description: Slug de categoria
        - name: productor_id
          in: query
          schema:
            type: integer
          description: ID del productor
        - name: busqueda
          in: query
          schema:
            type: string
          description: Texto de busqueda
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Lista de productos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductosResponse'

  /flavor-chat-ia/v1/gc/productores:
    get:
      tags:
        - Grupos de Consumo
      summary: Lista de productores
      operationId: getProductores
      parameters:
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: eco
          in: query
          schema:
            type: string
            enum: ['1', '']
          description: Filtrar por certificacion ecologica
        - name: con_entrega
          in: query
          schema:
            type: string
            enum: ['1', '']
          description: Filtrar por entrega a domicilio
      responses:
        '200':
          description: Lista de productores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductoresResponse'

  /flavor-chat-ia/v1/gc/productores-cercanos:
    get:
      tags:
        - Grupos de Consumo
      summary: Productores cercanos
      description: Obtiene productores que entregan en la ubicacion del usuario
      operationId: getProductoresCercanos
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            minimum: -90
            maximum: 90
          description: Latitud del usuario
        - name: lng
          in: query
          required: true
          schema:
            type: number
            minimum: -180
            maximum: 180
          description: Longitud del usuario
        - name: limite
          in: query
          schema:
            type: integer
            default: 20
          description: Limite de resultados
      responses:
        '200':
          description: Productores cercanos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductoresCercanosResponse'

  /flavor-chat-ia/v1/gc/cestas-tipo:
    get:
      tags:
        - Grupos de Consumo
      summary: Tipos de cestas
      operationId: getTiposCestas
      responses:
        '200':
          description: Lista de tipos de cestas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TiposCestasResponse'

  /flavor-chat-ia/v1/gc/ciclos/calendario:
    get:
      tags:
        - Grupos de Consumo
      summary: Calendario de ciclos
      operationId: getCalendarioCiclos
      parameters:
        - name: meses
          in: query
          schema:
            type: integer
            default: 3
          description: Numero de meses a consultar
      responses:
        '200':
          description: Calendario de ciclos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarioCiclosResponse'

  /flavor-chat-ia/v1/gc/pedidos/historial:
    get:
      tags:
        - Grupos de Consumo
      summary: Historial de pedidos
      operationId: getHistorialPedidos
      security:
        - bearerAuth: []
        - wpNonce: []
      parameters:
        - name: limite
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Historial de pedidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistorialPedidosResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================
  # RED DE COMUNIDADES - Directorio
  # ==========================================
  /flavor-network/v1/directory:
    get:
      tags:
        - Red de Comunidades
      summary: Directorio de nodos
      operationId: getDirectory
      parameters:
        - name: tipo
          in: query
          schema:
            type: string
          description: Tipo de entidad
        - name: sector
          in: query
          schema:
            type: string
          description: Sector de actividad
        - name: nivel
          in: query
          schema:
            type: string
          description: Nivel de consciencia
        - name: pais
          in: query
          schema:
            type: string
          description: Pais
        - name: ciudad
          in: query
          schema:
            type: string
          description: Ciudad
        - name: busqueda
          in: query
          schema:
            type: string
          description: Texto de busqueda
        - name: verificado
          in: query
          schema:
            type: boolean
          description: Solo verificados
        - name: pagina
          in: query
          schema:
            type: integer
            default: 1
        - name: por_pagina
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Lista de nodos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectoryResponse'

  /flavor-network/v1/node/{slug}:
    get:
      tags:
        - Red de Comunidades
      summary: Perfil de nodo
      operationId: getNodeProfile
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-z0-9-]+$'
      responses:
        '200':
          description: Perfil del nodo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeProfileResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /flavor-network/v1/map:
    get:
      tags:
        - Red de Comunidades
      summary: Datos del mapa
      operationId: getMapData
      parameters:
        - name: tipo
          in: query
          schema:
            type: string
        - name: nivel
          in: query
          schema:
            type: string
        - name: sector
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Datos para el mapa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapDataResponse'

  /flavor-network/v1/nearby:
    get:
      tags:
        - Red de Comunidades
      summary: Nodos cercanos
      operationId: getNearbyNodes
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
        - name: lng
          in: query
          required: true
          schema:
            type: number
        - name: radio
          in: query
          schema:
            type: number
            default: 50
          description: Radio en km
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Nodos cercanos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NearbyNodesResponse'

  # ==========================================
  # RED DE COMUNIDADES - Tablon
  # ==========================================
  /flavor-network/v1/board:
    get:
      tags:
        - Red de Comunidades
      summary: Tablon de anuncios
      operationId: getBoard
      parameters:
        - name: tipo
          in: query
          schema:
            type: string
        - name: pagina
          in: query
          schema:
            type: integer
            default: 1
        - name: por_pagina
          in: query
          schema:
            type: integer
            default: 15
      responses:
        '200':
          description: Publicaciones del tablon
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardResponse'
    post:
      tags:
        - Red de Comunidades
      summary: Publicar en tablon
      operationId: postBoard
      security:
        - bearerAuth: []
        - wpNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoardPostRequest'
      responses:
        '200':
          description: Publicacion creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /flavor-network/v1/board/{id}:
    put:
      tags:
        - Red de Comunidades
      summary: Actualizar publicacion
      operationId: updateBoard
      security:
        - bearerAuth: []
        - wpNonce: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoardPostRequest'
      responses:
        '200':
          description: Publicacion actualizada
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags:
        - Red de Comunidades
      summary: Eliminar publicacion
      operationId: deleteBoard
      security:
        - bearerAuth: []
        - wpNonce: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Publicacion eliminada
        '403':
          $ref: '#/components/responses/Forbidden'

  # ==========================================
  # RED DE COMUNIDADES - Eventos
  # ==========================================
  /flavor-network/v1/events:
    get:
      tags:
        - Red de Comunidades
        - Eventos
      summary: Lista de eventos
      operationId: getEvents
      responses:
        '200':
          description: Lista de eventos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventsResponse'
    post:
      tags:
        - Red de Comunidades
        - Eventos
      summary: Crear evento
      operationId: createEvent
      security:
        - bearerAuth: []
        - wpNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRequest'
      responses:
        '200':
          description: Evento creado
        '403':
          $ref: '#/components/responses/Forbidden'

  /flavor-network/v1/events/{id}:
    get:
      tags:
        - Red de Comunidades
        - Eventos
      summary: Detalle de evento
      operationId: getEventDetail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Detalle del evento
        '404':
