          type: string
        descripcion:
          type: string
        fecha_inicio:
          type: string
          format: date-time
        fecha_fin:
          type: string
          format: date-time
        ubicacion:
          type: string
        tipo:
          type: string
        imagen:
          type: string
          format: uri
        nodo_organizador:
          type: string

    EventsResponse:
      type: object
      properties:
        eventos:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        total:
          type: integer

    EventRequest:
      type: object
      required:
        - titulo
        - fecha_inicio
      properties:
        titulo:
          type: string
        descripcion:
          type: string
        fecha_inicio:
          type: string
          format: date-time
        fecha_fin:
          type: string
          format: date-time
        ubicacion:
          type: string
        tipo:
          type: string

