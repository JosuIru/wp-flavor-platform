components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT para autenticacion
    wpNonce:
      type: apiKey
      in: header
      name: X-WP-Nonce
      description: WordPress nonce para peticiones desde el frontend

  parameters:
    PedidoId:
      name: id
      in: path
      required: true
      description: ID del pedido
      schema:
        type: integer
        minimum: 1

  responses:
    BadRequest:
      description: Peticion invalida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: bad_request
            message: Parametros invalidos
            data:
              status: 400
    Unauthorized:
      description: No autenticado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: rest_forbidden
            message: Debes iniciar sesion
            data:
              status: 401
    Forbidden:
      description: Sin permisos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: rest_forbidden
            message: No tienes permisos para esta accion
            data:
              status: 403
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: not_found
            message: Recurso no encontrado
            data:
              status: 404

  schemas:
    # === Respuestas Genericas ===
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operacion completada

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          type: object
          properties:
            status:
              type: integer

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        per_page:
          type: integer
        current_page:
          type: integer
        total_pages:
          type: integer

    # === Pedidos ===
    Pedido:
      type: object
      properties:
        id:
          type: integer
        titulo:
          type: string
        descripcion:
          type: string
        productor:
          type: string
        producto:
          type: string
        precio_base:
          type: number
        gastos_gestion:
          type: number
        precio_final:
          type: number
        unidad:
          type: string
        cantidad_minima:
          type: number
        cantidad_maxima:
          type: number
        cantidad_actual:
          type: number
        progreso:
          type: number
        estado:
          type: string
          enum: [abierto, cerrado, entregado, cancelado]
        participantes_count:
          type: integer
        fecha_cierre:
          type: string
          format: date-time
        fecha_entrega:
          type: string
          format: date-time
        lugar_recogida:
          type: string
        imagen:
          type: string
          format: uri

    PedidosListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Pedido'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    PedidoDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          allOf:
            - $ref: '#/components/schemas/Pedido'
            - type: object
              properties:
                meta:
                  type: object
                  properties:
                    contacto:
                      type: string
                    instrucciones:
                      type: string

    MisPedidosResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/Pedido'
              - type: object
                properties:
                  mi_participacion:
                    type: object
                    properties:
                      cantidad:
                        type: number
                      importe:
                        type: number
                      pagado:
                        type: boolean
                      recogido:
                        type: boolean
                      fecha_inscripcion:
                        type: string
                        format: date-time
        total:
          type: integer

    # === Perfil Consumidor ===
    PerfilConsumidorResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            es_miembro:
              type: boolean
            consumidor:
              type: object
              properties:
                id:
                  type: integer
                rol:
                  type: string
                estado:
                  type: string
                preferencias_alimentarias:
                  type: string
                alergias:
                  type: string
                saldo_pendiente:
                  type: number
                fecha_alta:
                  type: string
                  format: date-time
            grupo:
              type: object
              properties:
                id:
                  type: integer
                nombre:
                  type: string

    # === Lista de Compra ===
    ListaCompraItem:
      type: object
      properties:
        id:
          type: integer
        producto_id:
          type: integer
        producto_nombre:
          type: string
        productor:
          type: string
        cantidad:
          type: number
        precio_unitario:
          type: number
        unidad:
          type: string
        subtotal:
          type: number
        imagen:
          type: string
          format: uri
        notas:
          type: string

    ListaCompraResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ListaCompraItem'
            total:
              type: number
            count:
              type: integer

    # === Suscripciones ===
    Suscripcion:
      type: object
      properties:
        id:
          type: integer
        tipo_cesta:
          type: object
          properties:
            id:
              type: integer
            nombre:
              type: string
            descripcion:
              type: string
            precio_base:
              type: number
        frecuencia:
          type: string
          enum: [semanal, quincenal, mensual]
        importe:
          type: number
        estado:
          type: string
          enum: [activa, pausada, cancelada]
        fecha_inicio:
          type: string
          format: date
        fecha_proximo_cargo:
          type: string
          format: date

    SuscripcionesResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Suscripcion'

    # === Productos ===
    Producto:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string
        descripcion:
          type: string
        precio:
          type: number
        unidad:
          type: string
        cantidad_minima:
          type: number
        stock:
          type: string
        temporada:
          type: string
        origen:
          type: string
        productor:
          type: object
          properties:
            id:
              type: integer
            nombre:
              type: string
            eco:
              type: boolean
        imagen:
          type: string
          format: uri
        categorias:
          type: array
          items:
            type: string

    ProductosResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Producto'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    # === Productores ===
    Productor:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string
        descripcion:
          type: string
        ubicacion:
          type: string
        direccion:
          type: string
        coordenadas:
          type: object
          nullable: true
          properties:
            lat:
              type: number
            lng:
              type: number
        radio_entrega_km:
          type: number
        tiene_entrega_domicilio:
          type: boolean
        certificacion_eco:
          type: boolean
        contacto:
          type: object
          properties:
            nombre:
              type: string
            telefono:
              type: string
            email:
              type: string
              format: email
        imagen:
          type: string
          format: uri
        url:
          type: string
          format: uri

    ProductoresResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Productor'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    ProductoresCercanosResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/Productor'
              - type: object
                properties:
                  distancia_km:
                    type: number
                  cantidad_productos:
                    type: integer
                  entrega_disponible:
                    type: boolean
        meta:
          type: object
          properties:
            ubicacion_usuario:
              type: object
              properties:
                lat:
                  type: number
                lng:
                  type: number
            total:
              type: integer

    # === Tipos de Cestas ===
    TipoCesta:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string
        slug:
          type: string
        descripcion:
          type: string
        precio_base:
          type: number
        imagen:
          type: string
          format: uri
          nullable: true

    TiposCestasResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/TipoCesta'

    # === Ciclos ===
    Ciclo:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string
        estado:
          type: string
        fecha_inicio:
          type: string
          format: date
        fecha_cierre:
          type: string
          format: date
        fecha_entrega:
          type: string
          format: date
        hora_entrega:
          type: string
        lugar_entrega:
          type: string
        notas:
          type: string

    CalendarioCiclosResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Ciclo'

    # === Historial ===
    HistorialPedido:
      type: object
      properties:
        ciclo_id:
          type: integer
        ciclo_nombre:
          type: string
          nullable: true
        estado:
          type: string
        fecha_entrega:
          type: string
          format: date
        num_items:
          type: integer
        total:
          type: number
        fecha_pedido:
          type: string
          format: date-time

    HistorialPedidosResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/HistorialPedido'

    # === Red de Comunidades ===
    NodoCard:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string
        slug:
          type: string
        tipo_entidad:
