                    type: number
        centro:
          type: object
          properties:
            lat:
              type: number
            lng:
              type: number
        radio_km:
          type: number

    # === Tablon ===
    BoardPost:
      type: object
      properties:
        id:
          type: integer
        tipo:
          type: string
        titulo:
          type: string
        contenido:
          type: string
        fecha_publicacion:
          type: string
          format: date-time
        fecha_fin:
          type: string
          format: date-time
          nullable: true
        prioridad:
          type: integer
        nodo_nombre:
          type: string
        nodo_logo:
          type: string
          format: uri
        nodo_slug:
          type: string

    BoardResponse:
      type: object
      properties:
