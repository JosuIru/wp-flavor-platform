        total:
          type: integer
        pagina:
          type: integer
        por_pagina:
          type: integer
        paginas:
          type: integer

    NodeProfileResponse:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string
        slug:
          type: string
        descripcion:
          type: string
        tipo_entidad:
          type: string
        sector:
          type: string
        logo_url:
          type: string
          format: uri
        banner_url:
          type: string
          format: uri
        sitio_web:
          type: string
          format: uri
        email:
          type: string
          format: email
        telefono:
          type: string
        direccion:
          type: string
        ciudad:
          type: string
        pais:
          type: string
        latitud:
          type: number
        longitud:
          type: number
        verificado:
          type: boolean
        nivel_consciencia:
          type: string
        redes_sociales:
          type: object
        fecha_creacion:
          type: string
          format: date-time

    MapDataResponse:
      type: object
      properties:
        nodos:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              nombre:
                type: string
              slug:
                type: string
              lat:
                type: number
              lng:
                type: number
              tipo:
                type: string
              nivel:
                type: string
        total:
          type: integer

    NearbyNodesResponse:
      type: object
      properties:
        nodos:
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/NodoCard'
              - type: object
                properties:
