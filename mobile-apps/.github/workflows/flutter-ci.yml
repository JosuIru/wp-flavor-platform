name: Flutter CI/CD

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'mobile-apps/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'mobile-apps/**'
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android APK/AAB'
        required: false
        default: 'true'
      build_ios:
        description: 'Build iOS IPA'
        required: false
        default: 'false'
      release:
        description: 'Create release'
        required: false
        default: 'false'

env:
  FLUTTER_VERSION: '3.19.0'
  JAVA_VERSION: '17'

jobs:
  # ============================================
  # ANALYZE & TEST
  # ============================================
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-apps

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: mobile-apps/coverage/lcov.info
          flags: flutter
          name: flutter-coverage

  # ============================================
  # BUILD ANDROID
  # ============================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'push' || github.event.inputs.build_android == 'true'
    defaults:
      run:
        working-directory: mobile-apps

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Decode Keystore
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-keystore.jks
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=release-keystore.jks" >> android/key.properties

      - name: Build APK (Debug)
        if: github.event_name == 'pull_request'
        run: flutter build apk --debug

      - name: Build APK (Release)
        if: github.event_name == 'push'
        run: flutter build apk --release

      - name: Build App Bundle (Release)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile-apps/build/app/outputs/flutter-apk/*.apk
          retention-days: 14

      - name: Upload AAB
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: mobile-apps/build/app/outputs/bundle/release/*.aab
          retention-days: 30

  # ============================================
  # BUILD iOS
  # ============================================
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: analyze
    if: github.event.inputs.build_ios == 'true'
    defaults:
      run:
        working-directory: mobile-apps

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS (No codesign)
        run: flutter build ios --release --no-codesign

      - name: Setup Certificates
        if: github.ref == 'refs/heads/main'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Setup Provisioning Profile
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build IPA
        if: github.ref == 'refs/heads/main'
        run: |
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: mobile-apps/build/ios/ipa/*.ipa
          retention-days: 30

  # ============================================
  # DEPLOY TO STORES (Manual trigger only)
  # ============================================
  deploy-play-store:
    name: Deploy to Play Store
    runs-on: ubuntu-latest
    needs: build-android
    if: github.event.inputs.release == 'true' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: android-aab

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Deploy to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.flavor.app
          releaseFiles: '*.aab'
          track: internal
          status: completed
          whatsNewDirectory: mobile-apps/fastlane/metadata/android

  deploy-app-store:
    name: Deploy to App Store
    runs-on: macos-latest
    needs: build-ios
    if: github.event.inputs.release == 'true' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa

      - name: Upload to App Store Connect
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: '*.ipa'
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

  # ============================================
  # NOTIFY
  # ============================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: always()

    steps:
      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Flutter build ${{ job.status }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
