name: chat_ia_apps
description: Apps móviles para Chat IA - Cliente y Admin
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # HTTP & API
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Navigation
  go_router: ^13.0.1

  # Database & Storage
  sqflite: ^2.3.2
  path: ^1.9.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.2
  image_picker: ^1.0.7
  file_picker: ^8.0.7
  webview_flutter: ^4.4.4
  connectivity_plus: ^5.0.2
  permission_handler: ^11.1.0
  path_provider: ^2.1.2
  share_plus: ^7.2.1

  # QR Scanner
  mobile_scanner: ^4.0.1

  # Vibration for feedback
  vibration: ^1.8.4

  # Home Screen Widgets
  home_widget: ^0.4.1

  # Quick Actions (3D Touch / App Shortcuts)
  quick_actions: ^1.0.0

  # Push Notifications (deshabilitado temporalmente)
  # firebase_core: ^2.24.2
  # firebase_messaging: ^14.7.10

  # Chat UI
  flutter_chat_ui: ^1.6.12
  flutter_chat_types: ^3.6.2

  # Charts (Admin)
  fl_chart: ^0.66.0

  # Calendar view
  table_calendar: ^3.0.9

  # QR Code generation
  qr_flutter: ^4.1.0

  # Add to device calendar
  add_2_calendar: ^3.0.1

  # Maps launcher
  map_launcher: ^3.1.0

  # Maps (OpenStreetMap) + Geolocation
  flutter_map: ^6.1.0
  flutter_map_marker_cluster: ^1.3.6
  latlong2: ^0.9.0
  geolocator: ^10.1.0

  # UUID generation
  uuid: ^4.2.1

  # Biometric authentication
  local_auth: ^2.1.8

  # E2E Encryption (Signal Protocol)
  cryptography: ^2.7.0
  convert: ^3.1.1

  # Audio player for radio streaming
  just_audio: ^0.9.36

  # Voice recording
  record: ^5.2.0

  # Keep screen awake during calls
  wakelock_plus: ^1.1.4

  # Video player
  video_player: ^2.8.2
  chewie: ^1.7.4

  # WebRTC for voice/video calls
  flutter_webrtc: ^0.11.7

  # App Reviews
  in_app_review: ^2.0.8

  # Deep Links (app_links reemplaza a uni_links descontinuado)
  app_links: ^6.0.0

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  build_runner: ^2.4.8
  retrofit_generator: ^8.0.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#2E7D32"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

dependency_overrides:
  record_linux: ^1.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
